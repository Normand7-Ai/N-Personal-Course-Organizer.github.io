<html>

	<link rel="stylesheet" href="style.css">

  <body>
    <header>
	  <img src="logo.png" width="80"/>
	  <h1>Personal Course Organizer</h1>
	</header>
	<nav>
	  <ul>
	    <li><a href="index.html">Home</a></li>
		<li><a href="courses.html">My Courses</a></li>

	  </ul>

	<main>
	  <h2>Add courses</h2>
	  <form>
	    <label>Course name:</label>
		<input type="text" name="course_name" placeholder="e.g:mathematics">
		<br><br><label>Instructor:</label>
		<input type="text" name="instructor" placeholder="Dr.Name">
		<br><br><label>Credit hours:</label>
		<input type="number" name="credit_hours" placeholder="e.g:2">
		<br><br><label>The place:</label>
		<input type="text" name="place">
		<br><br><label>Note:</label>
		<input type="text" name="note">
		<br><br><input type="submit" value="Save courses">
	  </form>
	</main>
	<footer>
	  <span class="creat">Craeted by </span>
